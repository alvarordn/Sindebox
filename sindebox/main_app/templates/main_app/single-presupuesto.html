{% extends 'base_template.html' %}

{% block content %}

<div class="main_container">
    <div class='card' >
        <div class="card__body">
            <h4> {{ presupuesto.coste}} </h4>
            <p> Cliente: {{presupuesto.cliente.nombre}} </p>
            <p> Teléfono: {{presupuesto.cliente.numero}} </p>
            <p> Correo electrónico: {{presupuesto.cliente.correo}} </p>
        </div>    
    </div>


<form method='POST' action=""  class="form">   
    {% csrf_token %} 
    <div class="form__field form__field--action">
      <input class="btn btn--main" type="submit" value="Generar Propuesta" />
    </div>
  </form>
</div>  

{% endblock content %}
