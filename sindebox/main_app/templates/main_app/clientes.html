{% extends 'base_template.html' %}

{% block content %}

<div class="main_container">
    <h1> Clientes </h1>
    <div class="grid grid--three">
        {% for cliente in clientes %}

            <div class="column">

                <div class='card' >
                    <a href='{% url 'cliente' cliente.referencia %}'>
                        <div class="card__body">
                            <h4>{{ cliente.nombre }}</h4>
                            <p>{{ cliente.correo }}</p>  
                            <p>{{ cliente.get_tipo_display  }}</p>  
                        </div>  
                    </a>
                </div>  

            </div>  

        {% endfor %}
    </div>  
</div>  

{% endblock content %}
