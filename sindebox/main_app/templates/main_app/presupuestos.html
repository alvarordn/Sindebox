{% extends 'base_template.html' %}

{% block content %}

<div class="main_container">
    <h1> Presupuestos </h1>
    <div class="grid grid--three">
        {% for p in presupuestos %}

            <div class="column">

                <div class='card' >
                    <a href='{% url 'presupuesto' p.referencia  %}'>
                        <div class="card__body">
                            <h4>{{ p.cliente }}</h4>
                            <p>{{ p.coste }}</p>  
                        </div>  
                    </a>
                </div>  

            </div>  

        {% endfor %}
    </div>  
</div>  

{% endblock content %}
